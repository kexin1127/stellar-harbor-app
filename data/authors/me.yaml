experience:
  - role: Undergraduate Researcher
    org: Subatomic Particle Center Detection with Improved U-Net
    start: 2025-06-01
    end: 2025-08-31
    summary: |
      Supervisor: Prof. Gunther Roland, Massachusetts Institute of Technology

      - Developed an Improved U-Net for high-density particle cluster center localization on 64×64 simulated TPC images.
      - Built a dataset of 10,000 Gaussian-based particle heatmaps and designed a full evaluation pipeline with Efficiency, Fake Rate, Bias, and Resolution metrics.
      - Improved localization accuracy through dilated-convolution bottlenecks, dropout regularization, and a hybrid MSE+BCE loss.
      - Benchmarked the model against CoG, Original U-Net, U2-Net, and U-Net++, showing stronger accuracy and robustness in dense overlapping scenarios.
      - Co-authored a paper accepted by TOCS 2025 as co-first author.

  - role: Undergraduate Researcher
    org: CLIP-DSAN Fusion for Unsupervised Domain Adaptation
    start: 2025-09-01
    end: 2026-03-31
    summary: |
      Supervisor: Linqing Huang, Assistant Researcher, Shanghai Jiao Tong University

      - Proposed a logits-space fusion framework integrating CLIP and DSAN through high-confidence agreement pseudo-labels and learnable softmax weights.
      - Reproduced CLIP zero-shot classification and DSAN subdomain alignment, and established a unified workflow for cross-domain image classification experiments.
      - Conducted experiments on Office-31, PACS, and ImageCLEF, analyzing threshold sensitivity and transfer-pair performance across multiple benchmarks.
      - Demonstrated that the proposed fusion strategy consistently matched or outperformed single-model baselines on multiple adaptation tasks.
  - role: Research Trainee
    org: Systematic Research Training in Advanced Deep Learning
    start: 2025-06-01
    end: 2026-04-30
    summary: |
      Supervisor: Prof. Hesheng Wang, Shanghai Jiao Tong University

      - Systematically studied deep learning theory and PyTorch practice, extending to reinforcement learning, imitation learning, Transformer, and Diffusion models.
      - Completed foundational experiments including MNIST handwritten digit classification and facial expression recognition.
      - Built a structured understanding of the relationships among machine learning, deep learning, reinforcement learning, and imitation learning.
      - Studied self-attention and cross-attention in Transformer architectures, as well as core reinforcement learning methods such as DQN and PPO.
